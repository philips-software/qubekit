name: Prepare Release PR (Release Please)
on:
  push:
    branches:
      - main

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  release-please:
    runs-on: [ubuntu-latest]
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
    steps:
      - id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # ratchet:googleapis/release-please-action@v5.0.0
        with:
          token: ${{ github.token }}
          release-type: node

  publish:
    needs:
      - release-please
    if: ${{ needs.release-please.outputs.releases_created }}
    runs-on: [ubuntu-latest]
    container: node:24-bookworm
    steps:
      - uses: actions/checkout@v6
      - run: corepack enable
      - run: yarn install
      - run: yarn build
      - run: yarn npm publish
