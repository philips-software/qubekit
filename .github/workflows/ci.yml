name: Build
on:
  pull_request:
    branches:
      - main

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  test:
    runs-on: [ubuntu-latest]
    container: node:24-bookworm
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # ratchet:actions/checkout@v3
        with:
          fetch-depth: 0

      - run: corepack enable

      - name: Build
        run: |
          yarn install
          yarn build

      - name: Test
        run: |
          yarn test
